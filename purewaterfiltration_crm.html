<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pure Water Filtration — Sales CRM</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap');

  :root {
    --bg: #f0f7ff;
    --surface: #ffffff;
    --card: #e8f3ff;
    --border: #b8d9f5;
    --accent: #0077cc;
    --accent2: #00b894;
    --red: #e84d4d;
    --orange: #e8934d;
    --blue: #0099ff;
    --purple: #6c5ce7;
    --text: #0a1f35;
    --muted: #5a7a99;
    --mono: 'DM Mono', monospace;
    --sans: 'Syne', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* HEADER */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 28px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-size: 18px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: var(--accent);
  }

  .logo span { color: var(--text); }
  
  header { box-shadow: 0 2px 12px rgba(0,119,204,0.1); }

  .stats-bar {
    display: flex;
    gap: 24px;
    font-family: var(--mono);
    font-size: 12px;
  }

  .stat { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .stat-val { font-size: 18px; font-weight: 500; }
  .stat-label { color: var(--muted); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; }
  .stat-val.green { color: var(--accent2); }
  .stat-val.red { color: var(--red); }
  .stat-val.orange { color: var(--orange); }
  .stat-val.blue { color: var(--blue); }
  .stat-val.yellow { color: var(--accent); }

  /* LAYOUT */
  .app { display: flex; flex: 1; overflow: hidden; height: calc(100vh - 57px); }

  /* SIDEBAR */
  .sidebar {
    width: 320px;
    min-width: 320px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-top {
    padding: 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .search-box {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 12px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    width: 100%;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-box:focus { border-color: var(--accent); }
  .search-box::placeholder { color: var(--muted); }

  .filter-tabs {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
  }

  .filter-tab {
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-family: var(--mono);
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .filter-tab:hover { border-color: var(--accent); color: var(--accent); }
  .filter-tab.active { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 500; }
  .filter-tab.green.active { background: var(--accent2); border-color: var(--accent2); }
  .filter-tab.red.active { background: var(--red); border-color: var(--red); color: #fff; }
  .filter-tab.orange.active { background: var(--orange); border-color: var(--orange); color: #fff; }
  .filter-tab.blue.active { background: var(--blue); border-color: var(--blue); color: #fff; }
  .filter-tab.purple.active { background: var(--purple); border-color: var(--purple); color: #fff; }

  /* LEAD LIST */
  .lead-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }

  .lead-list::-webkit-scrollbar { width: 4px; }
  .lead-list::-webkit-scrollbar-track { background: transparent; }
  .lead-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .lead-item {
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid transparent;
    cursor: pointer;
    transition: all 0.15s;
    margin-bottom: 4px;
    position: relative;
  }
  .lead-item:hover { background: #e0efff; border-color: var(--border); }
  .lead-item.active { background: #ddeeff; border-color: var(--accent); }

  .lead-name {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 3px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .lead-meta {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .dot-new { background: var(--muted); }
  .dot-no_answer { background: var(--orange); }
  .dot-callback { background: var(--blue); }
  .dot-interested { background: var(--accent2); }
  .dot-closed { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
  .dot-not_interested { background: var(--red); }
  .dot-do_not_call { background: var(--purple); }

  /* MAIN PANEL */
  .main {
    flex: 1;
    overflow-y: auto;
    padding: 28px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .main::-webkit-scrollbar { width: 4px; }
  .main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--muted);
  }

  .empty-icon { font-size: 48px; opacity: 0.3; }
  .empty-text { font-size: 16px; }
  .empty-sub { font-family: var(--mono); font-size: 12px; }

  /* CONTACT CARD */
  .contact-header {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 20px;
  }

  .contact-avatar {
    width: 56px;
    height: 56px;
    border-radius: 14px;
    background: linear-gradient(135deg, var(--accent) 0%, #c8a030 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    font-weight: 800;
    color: #000;
    flex-shrink: 0;
  }

  .contact-info { flex: 1; }

  .contact-name {
    font-size: 24px;
    font-weight: 800;
    letter-spacing: -0.5px;
    margin-bottom: 6px;
  }

  .contact-details {
    display: flex;
    flex-direction: column;
    gap: 4px;
    font-family: var(--mono);
    font-size: 13px;
    color: var(--muted);
  }

  .contact-detail { display: flex; align-items: center; gap: 8px; }
  .contact-detail a { color: var(--accent); text-decoration: none; }
  .contact-detail a:hover { text-decoration: underline; }

  .call-btn {
    background: var(--accent2);
    color: #000;
    border: none;
    border-radius: 10px;
    padding: 12px 20px;
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .call-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(77,232,160,0.3); }

  /* STATUS SECTION */
  .section-title {
    font-size: 11px;
    font-family: var(--mono);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-bottom: 12px;
  }

  .status-grid {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .status-btn {
    padding: 8px 16px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .status-btn:hover { border-color: var(--text); color: var(--text); }
  .status-btn.active-new { border-color: var(--muted); color: var(--text); background: rgba(107,107,128,0.15); }
  .status-btn.active-no_answer { border-color: var(--orange); color: var(--orange); background: rgba(232,147,77,0.1); }
  .status-btn.active-callback { border-color: var(--blue); color: var(--blue); background: rgba(77,154,232,0.1); }
  .status-btn.active-interested { border-color: var(--accent2); color: var(--accent2); background: rgba(77,232,160,0.1); }
  .status-btn.active-closed { border-color: var(--accent); color: var(--accent); background: rgba(232,197,71,0.1); }
  .status-btn.active-not_interested { border-color: var(--red); color: var(--red); background: rgba(232,77,77,0.1); }
  .status-btn.active-do_not_call { border-color: var(--purple); color: var(--purple); background: rgba(155,77,232,0.1); }

  /* CALLBACK DATE */
  .callback-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 10px;
  }
  .date-input {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    outline: none;
  }
  .date-input:focus { border-color: var(--blue); }

  /* NOTES */
  .notes-area {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    width: 100%;
    min-height: 100px;
    resize: vertical;
    outline: none;
    line-height: 1.6;
    transition: border-color 0.2s;
  }
  .notes-area:focus { border-color: var(--accent); }
  .notes-area::placeholder { color: var(--muted); }

  /* CALL LOG */
  .call-log {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .call-entry {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    font-family: var(--mono);
    font-size: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
  }

  .call-entry-left { display: flex; flex-direction: column; gap: 4px; flex: 1; }
  .call-entry-outcome { font-size: 11px; color: var(--muted); }
  .call-entry-note { color: var(--text); }
  .call-entry-time { color: var(--muted); font-size: 11px; white-space: nowrap; flex-shrink: 0; }

  .log-call-btn {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 16px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    margin-top: 6px;
    align-self: flex-start;
  }
  .log-call-btn:hover { border-color: var(--accent2); color: var(--accent2); }

  .section-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
  }

  .save-indicator {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent2);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .save-indicator.show { opacity: 1; }

  .no-leads {
    padding: 24px;
    text-align: center;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 12px;
  }

  .count-badge {
    font-family: var(--mono);
    font-size: 10px;
    background: var(--border);
    padding: 2px 6px;
    border-radius: 10px;
    color: var(--muted);
  }
</style>
</head>

const STORAGE_KEY = 'monkh_crm_v2';
const STATUSES = [
  { key: 'new', label: '⬜ New', dot: 'dot-new' },
  { key: 'no_answer', label: '📵 No Answer', dot: 'dot-no_answer' },
  { key: 'callback', label: '📅 Callback', dot: 'dot-callback' },
  { key: 'interested', label: '⭐ Interested', dot: 'dot-interested' },
  { key: 'closed', label: '✅ Closed', dot: 'dot-closed' },
  { key: 'not_interested', label: '👎 Not Interested', dot: 'dot-not_interested' },
  { key: 'do_not_call', label: '🚫 Do Not Call', dot: 'dot-do_not_call' },
];

let leads = [];
let activeId = null;
let currentFilter = 'all';
let saveTimer = null;

function loadData() {
  const stored = localStorage.getItem(STORAGE_KEY);
  if (stored) {
    leads = JSON.parse(stored);
    // Merge any new contacts not in stored data
    RAW_CONTACTS.forEach(c => {
      const id = c.phone1;
      if (!leads.find(l => l.id === id)) {
        leads.push(makeLead(c));
      }
    });
  } else {
    leads = RAW_CONTACTS.map(makeLead);
  }
  saveData();
}

function makeLead(c) {
  return {
    id: c.phone1,
    first_name: c.first_name,
    last_name: c.last_name,
    address: c.company_name,
    phone: c.phone1,
    email: c.email,
    status: 'new',
    notes: '',
    callback_date: '',
    call_log: []
  };
}

function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(leads));
}

function getLead(id) { return leads.find(l => l.id === id); }

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.filter === f);
  });
  renderList();
}

function getFilteredLeads() {
  const q = document.getElementById('search').value.toLowerCase();
  return leads.filter(l => {
    const matchFilter = currentFilter === 'all' || l.status === currentFilter;
    const matchSearch = !q || 
      `${l.first_name} ${l.last_name}`.toLowerCase().includes(q) ||
      l.phone.includes(q) ||
      l.address.toLowerCase().includes(q) ||
      l.email.toLowerCase().includes(q);
    return matchFilter && matchSearch;
  });
}

function renderList() {
  const list = document.getElementById('lead-list');
  const filtered = getFilteredLeads();
  
  if (filtered.length === 0) {
    list.innerHTML = '<div class="no-leads">No leads found</div>';
    return;
  }

  list.innerHTML = filtered.map(l => {
    const statusDot = STATUSES.find(s => s.key === l.status);
    return `
      <div class="lead-item ${l.id === activeId ? 'active' : ''}" onclick="selectLead('${l.id}')">
        <div class="lead-name">
          <div class="status-dot ${statusDot ? statusDot.dot : 'dot-new'}"></div>
          ${l.first_name} ${l.last_name}
          ${l.call_log.length > 0 ? `<span class="count-badge">${l.call_log.length}</span>` : ''}
        </div>
        <div class="lead-meta">${l.phone} · ${l.address}</div>
      </div>
    `;
  }).join('');

  updateStats();
}

function updateStats() {
  document.getElementById('stat-total').textContent = leads.length;
  document.getElementById('stat-closed').textContent = leads.filter(l => l.status === 'closed').length;
  document.getElementById('stat-interested').textContent = leads.filter(l => l.status === 'interested').length;
  document.getElementById('stat-callback').textContent = leads.filter(l => l.status === 'callback').length;
  document.getElementById('stat-no-answer').textContent = leads.filter(l => l.status === 'no_answer').length;
  document.getElementById('stat-not-interested').textContent = leads.filter(l => l.status === 'not_interested').length;
}

function selectLead(id) {
  activeId = id;
  renderList();
  renderMain();
}

function renderMain() {
  const lead = getLead(activeId);
  if (!lead) return;

  const initials = (lead.first_name[0] || '') + (lead.last_name[0] || '');
  const panel = document.getElementById('main-panel');

  panel.innerHTML = `
    <div class="contact-header">
      <div style="display:flex;gap:16px;align-items:flex-start;flex:1">
        <div class="contact-avatar">${initials.toUpperCase()}</div>
        <div class="contact-info">
          <div class="contact-name">${lead.first_name} ${lead.last_name}</div>
          <div class="contact-details">
            <div class="contact-detail">📞 <a href="tel:${lead.phone}">${lead.phone}</a></div>
            <div class="contact-detail">📧 <a href="mailto:${lead.email}">${lead.email}</a></div>
            <div class="contact-detail">📍 ${lead.address}</div>
          </div>
        </div>
      </div>
      <button class="call-btn" onclick="logQuickCall()">📞 Log Call</button>
    </div>

    <div class="section-card">
      <div class="section-title">Call Outcome</div>
      <div class="status-grid">
        ${STATUSES.map(s => `
          <button class="status-btn ${lead.status === s.key ? 'active-'+s.key : ''}" 
            onclick="setStatus('${s.key}')">${s.label}</button>
        `).join('')}
      </div>
      <div class="callback-row" id="callback-row" style="display:${lead.status === 'callback' ? 'flex' : 'none'}">
        <span style="font-family:var(--mono);font-size:12px;color:var(--muted)">Callback date:</span>
        <input type="datetime-local" class="date-input" id="callback-date" 
          value="${lead.callback_date}" onchange="setCallbackDate(this.value)">
      </div>
    </div>

    <div class="section-card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <div class="section-title" style="margin-bottom:0">Notes</div>
        <span class="save-indicator" id="save-ind">Saved ✓</span>
      </div>
      <textarea class="notes-area" id="notes-area" placeholder="Add call notes, objections, what they said..." 
        oninput="scheduleNoteSave()">${lead.notes}</textarea>
    </div>

    <div class="section-card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <div class="section-title" style="margin-bottom:0">Call History (${lead.call_log.length})</div>
        <button class="log-call-btn" onclick="logManualCall()">+ Log Call</button>
      </div>
      <div class="call-log" id="call-log">
        ${lead.call_log.length === 0 
          ? '<div style="color:var(--muted);font-family:var(--mono);font-size:12px">No calls logged yet</div>'
          : lead.call_log.slice().reverse().map(c => `
            <div class="call-entry">
              <div class="call-entry-left">
                <div class="call-entry-outcome">${STATUSES.find(s=>s.key===c.outcome)?.label || c.outcome}</div>
                ${c.note ? `<div class="call-entry-note">${c.note}</div>` : ''}
              </div>
              <div class="call-entry-time">${c.time}</div>
            </div>
          `).join('')
        }
      </div>
    </div>
  `;
}

function setStatus(status) {
  const lead = getLead(activeId);
  if (!lead) return;
  lead.status = status;
  saveData();
  renderList();
  renderMain();
}

function setCallbackDate(val) {
  const lead = getLead(activeId);
  if (!lead) return;
  lead.callback_date = val;
  saveData();
}

function scheduleNoteSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    const lead = getLead(activeId);
    if (!lead) return;
    lead.notes = document.getElementById('notes-area').value;
    saveData();
    const ind = document.getElementById('save-ind');
    if (ind) {
      ind.classList.add('show');
      setTimeout(() => ind.classList.remove('show'), 2000);
    }
  }, 600);
}

function logQuickCall() {
  const lead = getLead(activeId);
  if (!lead) return;
  const outcome = lead.status === 'new' ? 'no_answer' : lead.status;
  const note = document.getElementById('notes-area')?.value?.trim() || '';
  lead.call_log.push({
    outcome,
    note,
    time: new Date().toLocaleString('en-AU', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' })
  });
  saveData();
  renderMain();
}

function logManualCall() {
  const lead = getLead(activeId);
  if (!lead) return;
  const outcomes = STATUSES.map(s => s.label).join('\n');
  const choice = prompt(`Log outcome:\n1. No Answer\n2. Callback\n3. Interested\n4. Closed\n5. Not Interested\n6. Do Not Call\n\nEnter number:`);
  const map = {'1':'no_answer','2':'callback','3':'interested','4':'closed','5':'not_interested','6':'do_not_call'};
  const outcome = map[choice?.trim()];
  if (!outcome) return;
  const note = prompt('Add a note (optional):') || '';
  lead.call_log.push({
    outcome,
    note,
    time: new Date().toLocaleString('en-AU', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' })
  });
  lead.status = outcome;
  saveData();
  renderList();
  renderMain();
}

// Init
loadData();
renderList();
</script>
