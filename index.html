};
function getTZ(s){ return TZ[(s||'').toLowerCase().trim()] || 'Australia/Sydney'; }
function localTime(state){
  const tz = getTZ(state), now = new Date();
  const h = parseInt(now.toLocaleString('en-AU',{timeZone:tz,hour:'numeric',hour12:false}));
  const t = now.toLocaleTimeString('en-AU',{timeZone:tz,hour:'2-digit',minute:'2-digit',hour12:true});
  const q = h<8||h>=21?'t-bad':h<9||h>=20?'t-warn':'t-good';
  const msg = h<8?'⛔ Too early':h>=21?'⛔ Too late':h<9?'⚠️ Call with care':h>=20?'⚠️ Getting late':'✅ Good to call';
  return {t, q, msg, label:tz.replace('Australia/','')};
}

const KEY='pwf_crm_v3';
const ORDER=['new','no_answer','callback','interested','closed','not_interested','do_not_call'];
const SM={
  new:{label:'⬜ New',pill:'p-new'},
  no_answer:{label:'📵 No Answer',pill:'p-no_answer'},
  callback:{label:'📅 Callback',pill:'p-callback'},
  interested:{label:'⭐ Interested',pill:'p-interested'},
  closed:{label:'✅ Closed',pill:'p-closed'},
  not_interested:{label:'👎 Not Interested',pill:'p-not_interested'},
  do_not_call:{label:'🚫 Do Not Call',pill:'p-do_not_call'},
};

let leads=[], activeId=null, filter='all', saveTimer=null;

function load(){
  const s=localStorage.getItem(KEY);
  if(s){ leads=JSON.parse(s); RAW.forEach(r=>{if(!leads.find(l=>l.id===r.ph))leads.push(mk(r));}); }
  else leads=RAW.map(mk);
  save();
}
function mk(r){return{id:r.ph,fn:r.fn,ln:r.ln,ph:r.ph,em:r.em,addr:r.addr,state:r.state,post:r.post,status:'new',notes:'',cb:'',log:[]};}
function save(){localStorage.setItem(KEY,JSON.stringify(leads));}
function get(id){return leads.find(l=>l.id===id);}

function setFilter(f){
  filter=f;
  document.querySelectorAll('.filter-tab').forEach(t=>t.classList.toggle('active',t.dataset.f===f));
  renderList();
}

function getFiltered(){
  const q=document.getElementById('search').value.toLowerCase();
  let list=leads.filter(l=>{
    const mf=filter==='all'||l.status===filter;
    const stateNorm={'western australia':'wa','victoria':'vic','queensland':'qld','south australia':'sa','new south wales':'nsw','northern territory':'nt','tasmania':'tas'};
    const stateQ=stateNorm[l.state.toLowerCase().trim()]||l.state.toLowerCase().trim();
    const mq=!q||`${l.fn} ${l.ln}`.toLowerCase().includes(q)||l.ph.includes(q)||l.addr.toLowerCase().includes(q)||stateQ.includes(q)||l.state.toLowerCase().includes(q)||l.post.includes(q);
    return mf&&mq;
  });
  list.sort((a,b)=>{
    const d=ORDER.indexOf(a.status)-ORDER.indexOf(b.status);
    return d!==0?d:`${a.fn}${a.ln}`.localeCompare(`${b.fn}${b.ln}`);
  });
  return list;
}

function renderList(){
  const el=document.getElementById('lead-list');
  const items=getFiltered();
  if(!items.length){el.innerHTML='<div class="no-leads">No leads found</div>';updateStats();return;}
  let html='', lastS=null;
  items.forEach(l=>{
    if(l.status!==lastS){
      if(lastS!==null)html+=`<div style="height:4px"></div>`;
      html+=`<div class="group-label">${SM[l.status].label}</div>`;
      lastS=l.status;
    }
    const lt=localTime(l.state);
    html+=`<div class="lead-item s-${l.status}${l.id===activeId?' active':''}" onclick="sel('${l.id}')">
      <div class="lead-name">
        ${l.fn} ${l.ln}
        <span class="status-pill ${SM[l.status].pill}">${l.status.replace('_',' ')}</span>
        ${l.log.length?`<span class="count-badge">${l.log.length}</span>`:''}
      </div>
      <div class="lead-meta">${l.ph} · ${l.state} ${l.post}</div>
      <div class="lead-time ${lt.q}">🕐 ${lt.t} (${lt.label})</div>
    </div>`;
  });
  el.innerHTML=html;
  updateStats();
}

function updateStats(){
  document.getElementById('s-total').textContent=leads.length;
  ['closed','interested','callback','no_answer','not_interested','new'].forEach(s=>{
    document.getElementById('s-'+s).textContent=leads.filter(l=>l.status===s).length;
  });
}

function sel(id){activeId=id;renderList();renderMain();}

function renderMain(){
  const l=get(activeId); if(!l)return;
  const init=(l.fn[0]||'')+(l.ln[0]||'');
  const lt=localTime(l.state);
  document.getElementById('main-panel').innerHTML=`
    <div class="contact-header">
      <div style="display:flex;gap:13px;align-items:flex-start;flex:1">
        <div class="contact-avatar">${init.toUpperCase()}</div>
        <div>
          <div class="contact-name">${l.fn} ${l.ln}</div>
          <div class="contact-details">
            <div class="contact-detail">📞 <a href="tel:${l.ph}">${l.ph}</a></div>
            <div class="contact-detail">📧 <a href="mailto:${l.em}">${l.em}</a></div>
            <div class="contact-detail">📍 ${l.addr}, ${l.state} ${l.post}</div>
          </div>
          <div class="time-badge ${lt.q}">🕐 ${lt.t} local · ${lt.msg}</div>
        </div>
      </div>
      <button class="call-btn" onclick="quickLog()">📞 Log Call</button>
    </div>

    <div class="section-card">
      <div class="section-title">Classify this lead</div>
      <div class="status-grid">
        ${Object.entries(SM).map(([k,v])=>`<button class="status-btn${l.status===k?' a-'+k:''}" onclick="setS('${k}')">${v.label}</button>`).join('')}
      </div>
      <div id="cb-row" style="display:${l.status==='callback'?'flex':'none'}" class="callback-row">
        <span style="font-family:var(--mono);font-size:11px;color:var(--muted)">Callback date/time:</span>
        <input type="datetime-local" class="date-input" id="cb-date" value="${l.cb}" onchange="setCB(this.value)">
      </div>
    </div>

    <div class="section-card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <div class="section-title" style="margin-bottom:0">Notes</div>
        <span class="save-ind" id="si">Saved ✓</span>
      </div>
      <textarea class="notes-area" id="na" placeholder="Objections, what they said, next steps..." oninput="schedSave()">${l.notes}</textarea>
    </div>

    <div class="section-card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <div class="section-title" style="margin-bottom:0">Call History (${l.log.length})</div>
        <button class="log-call-btn" onclick="manualLog()">+ Log Call</button>
      </div>
      ${l.log.length===0
        ?'<div style="color:var(--muted);font-family:var(--mono);font-size:11px">No calls logged yet</div>'
        :l.log.slice().reverse().map(c=>`
          <div class="call-entry">
            <div class="call-entry-left">
              <div class="call-entry-outcome">${SM[c.outcome]?.label||c.outcome}</div>
              ${c.note?`<div style="color:var(--text)">${c.note}</div>`:''}
            </div>
            <div class="call-entry-time">${c.time}</div>
          </div>`).join('')
      }
    </div>`;
}

function setS(s){const l=get(activeId);if(!l)return;l.status=s;save();renderList();renderMain();}
function setCB(v){const l=get(activeId);if(!l)return;l.cb=v;save();}
function schedSave(){
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>{
    const l=get(activeId);if(!l)return;
    l.notes=document.getElementById('na').value;save();
    const si=document.getElementById('si');
    if(si){si.classList.add('show');setTimeout(()=>si.classList.remove('show'),2000);}
  },600);
}
function quickLog(){
  const l=get(activeId);if(!l)return;
  const note=document.getElementById('na')?.value?.trim()||'';
  l.log.push({outcome:l.status,note,time:new Date().toLocaleString('en-AU',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})});
  save();renderMain();
}
function manualLog(){
  const l=get(activeId);if(!l)return;
  const c=prompt('Outcome:\n1 No Answer\n2 Callback\n3 Interested\n4 Closed\n5 Not Interested\n6 Do Not Call\n\nEnter number:');
  const m={'1':'no_answer','2':'callback','3':'interested','4':'closed','5':'not_interested','6':'do_not_call'};
  const o=m[c?.trim()];if(!o)return;
  const n=prompt('Note (optional):')||'';
  l.log.push({outcome:o,note:n,time:new Date().toLocaleString('en-AU',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})});
  l.status=o;save();renderList();renderMain();
}

setInterval(()=>{renderList();if(activeId)renderMain();},60000);
load();renderList();
</script>
